services:
  e2e-test-runner:
    build: ./e2e
    environment:
      - DIFFICALCY_HOST=difficalcy-performanceplus:80
      - DIFFICALCY_SLIM_HOST=difficalcy-performanceplus-slim:80
    depends_on:
      - difficalcy-performanceplus
      - difficalcy-performanceplus-slim

  beatmap-server:
    image: caddy:2-alpine
    volumes:
      - ./e2e/beatmaps:/usr/share/caddy:ro

  difficalcy-performanceplus:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BEATMAP_DOWNLOAD_URL=http://beatmap-server:80/{beatmapId}.osu
    depends_on:
      - beatmap-server

  difficalcy-performanceplus-slim:
    build:
      context: .
      target: publish-slim
      args:
        - OSU_COMMIT_HASH
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BEATMAP_DOWNLOAD_URL=http://beatmap-server:80/{beatmapId}.osu
    depends_on:
      - beatmap-server
      - cache
